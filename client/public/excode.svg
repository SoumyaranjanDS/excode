<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- Minimalist Excode Symbol (E + >) -->
  <g fill="none" stroke="#3B82F6" stroke-width="8" stroke-linecap="square" stroke-linejoin="miter">
    <!-- Letter 'E' Structure -->
    <line x1="20" y1="20" x2="20" y2="80" />
    <line x1="20" y1="20" x2="45" y2="20" />
    <line x1="20" y1="50" x2="40" y2="50" />
    <line x1="20" y1="80" x2="45" y2="80" />
    
    <!-- Execution Arrow '>' -->
    <polyline points="55,20 85,50 55,80" />
  </g>
</svg>